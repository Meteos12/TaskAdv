<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:12px;
  background:#1a1a2e;
  color:#fff;
  font-family:sans-serif;
  overflow-x:hidden;
}

h1,h2,h3{
  margin:0 0 10px;
}

.container{
  max-width:900px;
  margin:auto;
}

  background:#16213e;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  box-shadow:0 4px 12px rgba(0,0,0,.4);
}

small{
  opacity:.7;
}

.flex{
  display:flex;
  gap:10px;
}

.wrap{
  flex-wrap:wrap;
}

.center{
  text-align:center;
}

button{
  background:#f72585;
  color:#fff;
  border:none;
  padding:10px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:.9;
}

input,select{
  background:#0f3460;
  border:none;
  color:#fff;
  padding:10px;
  border-radius:8px;
}

#topStats{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
}

.stat{
  background:#0f3460;
  border-radius:8px;
  padding:8px;
  text-align:center;
}

.statValue{
  font-size:20px;
  color:#4cc9f0;
  font-weight:bold;
}

.bar{
  height:22px;
  background:#333;
  border-radius:999px;
  overflow:hidden;
}

.barInner{
  height:100%;
  transition:.3s;
}

.hpBar{
  background:linear-gradient(to right,#ef4444,#facc15);
}

.expBar{
  background:linear-gradient(to right,#3b82f6,#06b6d4);
}

.task{
  background:#0f3460;
  border-radius:10px;
  padding:10px;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:.2s;
}

.task:hover{
  transform:translateY(-2px);
}

.task.done{
  background:#444;
  opacity:.6;
  text-decoration:line-through;
}

.weight{
  padding:4px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.w1{background:#4ade80;color:#000;}
.w3{background:#3b82f6;}
.w5{background:#ef4444;}

#comboText{
  text-align:center;
  font-size:28px;
  color:gold;
  font-weight:bold;
  min-height:40px;
}

.party{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.card{
  width:120px;
  background:#111827;
  border-radius:12px;
  padding:8px;
  text-align:center;
  position:relative;
  animation:pop .3s;
}

.card button{
  width:100%;
  margin-top:6px;
  padding:6px;
}

.rarity{
  font-weight:bold;
}

.role{
  font-size:13px;
  opacity:.9;
}

.element{
  font-size:18px;
}

.partySlot{
  min-height:120px;
  border:2px dashed rgba(255,255,255,.2);
  border-radius:10px;
  padding:6px;
}

.damage{
  position:fixed;
  left:50%;
  top:40%;
  transform:translateX(-50%);
  color:#fff;
  font-size:40px;
  font-weight:bold;
  z-index:9999;
  pointer-events:none;
  animation:damageFloat .8s forwards;
  text-shadow:0 0 10px #000;
}

#cutin{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.85);
  z-index:5000;
}

#cutin img{
  width:min(85vw,520px);
  animation:cutinAnim .7s ease-out;
  filter:
  drop-shadow(0 0 10px #ff00ff)
  drop-shadow(0 0 30px #a855f7);
}

#cutinText{
  position:absolute;
  bottom:10%;
  font-size:32px;
  color:#fff;
  text-shadow:0 0 10px #ff00ff;
}

#gachaOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.92);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:4000;
}

#gachaCards{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  justify-content:center;
  margin-bottom:20px;
}

.fever{
  animation:feverBg 1s infinite alternate;
}

@keyframes pop{
  0%{transform:scale(0);}
  100%{transform:scale(1);}
}

@keyframes damageFloat{
  0%{
    opacity:1;
    transform:translate(-50%,0) scale(1);
  }
  100%{
    opacity:0;
    transform:translate(-50%,-100px) scale(1.5);
  }
}

@keyframes cutinAnim{
  0%{
    transform:translateX(-400px) scale(.7);
    opacity:0;
  }
  60%{
    transform:translateX(30px) scale(1.15);
    opacity:1;
  }
  100%{
    transform:translateX(0) scale(1);
  }
}

@keyframes feverBg{
  from{
    background:#1a1a2e;
  }
  to{
    background:#442200;
  }
}

@keyframes screenShake{
  0%{transform:translate(0);}
  25%{transform:translate(6px,-6px);}
  50%{transform:translate(-6px,6px);}
  75%{transform:translate(6px,6px);}
  100%{transform:translate(0);}
}

</style>

const DAILY_MISSIONS = [

// ======================

let state = JSON.parse(localStorage.getItem("life_rpg")) || {

  level:1,
  exp:0,

  offlineMax:24 * 60 * 60 * 1000,

  tasksCompleted:0,
  bossesDefeated:0,
  goldEarned:0,

  milestonesCompleted:[],

  dailyMissionsCompleted:[],
  dailyMissionsDate:"",

  materials:{},

  boss:{

    maxHp:100,
    element:"red",
    phase:1,
    difficulty:"normal"
  },

  teamBonus:0,
  teamSynergyPercentage:0

};

// ======================
// チーム相性ボーナス
// ======================

function calculateTeamSynergy(){

  if(state.party.length < 2){
    state.teamBonus = 0;
    return 0;
  }

  let elements = state.party.map(c=>c.element);
  let roles = state.party.map(c=>c.role);

  let bonus = 0;

  // 属性ボーナス: 全員違う属性 +20%
  if(new Set(elements).size === elements.length){
    bonus += 20;
  }

  // ロール多様性: 全員違うロール +15%
  if(new Set(roles).size === roles.length){
    bonus += 15;
  }

  // 属性相性チェーン: 火→緑→青のサイクル +10%
  let hasChain = false;
  if(elements.length >= 2){
    for(let i=0;i<elements.length;i++){
      let next = (i+1) % elements.length;
      if(getElementMultiplier(elements[i], elements[next]) === 1.5){
        hasChain = true;
        break;
      }
    }
    if(hasChain) bonus += 10;
  }

  state.teamBonus = Math.min(bonus, 50); // 上限50%
  state.teamSynergyPercentage = state.teamBonus;

  return state.teamBonus;

}

// ======================
// ログインボーナス
// ======================

function checkLoginBonus(){

  let today = getTodayDateKey();
  let lastLogin = state.lastLoginDate;

  if(lastLogin === today){
    return; // 今日はすでにログイン済み
  }

  // 連続日数を更新
  let yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];

  if(lastLogin === yesterday){
    state.loginStreak++;
  } else {
    state.loginStreak = 1;
  }

  state.lastLoginDate = today;

  // ボーナス計算
  let coin = Math.floor(state.loginStreak / 7) + 1; // 7日ごとに+1
  let gold = state.loginStreak * 10;
  let exp = state.loginStreak * 5;

  state.gachaCoins += coin;
  state.gold += gold;
  state.exp += exp;

  // アラート表示
  let msg = `ログインボーナス！ (${state.loginStreak}日目)<br>`;
  msg += `ガチャコイン+${coin}<br>`;

  DAILY_MISSIONS.forEach(m=>{

    if(m.type === "tasks") completed = state.tasksCompleted >= m.target;

${m.desc}

ゴールド+${m.reward.gold}`

// ======================

function getElementMultiplier(a,b){

  if(a==="red" && b==="green") return 1.5;
  if(a==="green" && b==="blue") return 1.5;
  if(a==="blue" && b==="red") return 1.5;

  if(a==="green" && b==="red") return 0.7;
  if(a==="blue" && b==="green") return 0.7;
  if(a==="red" && b==="blue") return 0.7;

  return 1;
}

// ======================
// ボス
// ======================

function getTodayBossElement(){

  let day = Math.floor(Date.now()/86400000);

  let loop = ["red","blue"];

  return loop[day % loop.length];
}

function getDifficultyMultiplier(){
  let diff = state.boss.difficulty || "normal";
  if(diff === "easy") return 0.6;
  if(diff === "normal") return 1;
  if(diff === "hard") return 1.5;
  return 1;
}

function spawnBoss(){

  let mult = getDifficultyMultiplier();

  let hp = Math.floor((100 + (state.level * 50)) * mult);

  state.boss = {
    hp,
    maxHp:hp,
    element:getTodayBossElement(),
    phase:1,
    difficulty:state.boss.difficulty || "normal"
  };

}

function updateBossPhase(){

  let rate =
  state.boss.hp /
  state.boss.maxHp;

  let phase = 1;

  if(rate <= .6) phase = 2;
  if(rate <= .3) phase = 3;

  if(phase !== state.boss.phase){

    state.boss.phase = phase;

    document.body.style.animation =
    "screenShake .3s";

    setTimeout(()=>{
      document.body.style.animation = "";
    },300);

  }

}

function defeatBoss(){

  state.gachaCoins++;

  state.bossesDefeated++;

  alert("ボス撃破！ガチャコイン+1");

  checkMilestones();
  checkDailyMissions();

  spawnBoss();

}

// タスク
// ======================

function addTask(){

  let text = taskInput.value.trim();

  if(!text) return;

  state.tasks.push({
    text,
    weight:Number(taskWeight.value),
    done:false
  });

  taskInput.value = "";

  save();
  render();

}

async function completeTask(index){

  let task = state.tasks[index];

  if(task.done) return;

  task.done = true;

  state.tasksCompleted++;

  state.combo++;

  if(state.combo > state.maxCombo){
    state.maxCombo = state.combo;
  }

  // フィーバー
  if(state.combo >= 10 || task.weight >= 5){
    startFever();
  }

  // 基礎報酬
  let expGain = 10 * task.weight;
  let goldGain = 5 * task.weight;
  let dmg = 15 * task.weight;

  // 難易度倍率
  let diffMultiplier = getDifficultyMultiplier();
  expGain *= diffMultiplier;
  goldGain *= diffMultiplier;
  dmg *= diffMultiplier;

  // パーティ効果
  state.party.forEach(c=>{

    let mult =
    getElementMultiplier(
      c.element,
      state.boss.element
    );

    let final = c.atk * mult;

    // ロール
    if(c.role === "support"){
      dmg *= 1.1;
    }

    if(c.role === "tank"){
      final *= 0.8;
      goldGain *= 1.2;
    }

    if(c.role === "attacker"){
      final *= 1.2;
    }

    dmg += final;

  });

  // チーム相性ボーナス
  let synergyBonus = calculateTeamSynergy() / 100;
  dmg *= (1 + synergyBonus);
  expGain *= (1 + synergyBonus);
  goldGain *= (1 + synergyBonus);

  // フィーバー
  if(state.fever.active){
    dmg *= 2;
    expGain *= 2;
    goldGain *= 2;
  }

  // 演出
  await animateAttack();

  // 適用
  state.exp += Math.floor(expGain);
  state.gold += Math.floor(goldGain);

  state.goldEarned += Math.floor(goldGain);

  state.boss.hp -= Math.floor(dmg);

  showDamage(
    Math.floor(dmg)
  );

  // レベル
  while(state.exp >= EXP_PER_LEVEL){

    state.exp -= EXP_PER_LEVEL;

    state.level++;

    alert(
      `レベルアップ！ Lv${state.level}`
    );

  }

  // ボス
  if(state.boss.hp <= 0){
    defeatBoss();
  }

  updateBossPhase();

  checkMilestones();
  checkDailyMissions();

  save();
  render();

}

function startFever(){

  state.fever.active = true;

  state.fever.end =
  Date.now() + 30000;

  document.body.classList.add("fever");

}

function updateFever(){

  if(
    state.fever.active &&
    Date.now() > state.fever.end
  ){

    state.fever.active = false;

    document.body.classList.remove("fever");

  }

}

// 放置
// ======================

function applyOfflineProgress(){

  let now = Date.now();

  let diff =
  Math.min(
    now - state.lastLogin,
    state.offlineMax
  );

  let sec = Math.floor(diff / 1000);

  let dps = 0;

  state.party.forEach(c=>{
    dps += c.atk;
  });

  let damage =
  Math.floor(dps * sec / 5);

  let gold =
  Math.floor(sec * .5);

  state.gold += gold;

  state.boss.hp -= damage;

  state.lastLogin = now;

  if(state.boss.hp <= 0){
    defeatBoss();
  }

  alert(
`放置報酬

ダメージ:
${damage}

Gold:
${gold}`
  );

  checkMilestones();
  checkDailyMissions();

  save();
  render();

}

function levelUpMonster(rarity, index){

  let companion = state.companions[index];

  if(!companion || companion.rarity !== rarity){
    alert("モンスターを選択してください");
    return;
  }

  let needed = rarity === "SSR" ? 3 : (rarity === "SR" ? 2 : 1);

  if(!state.materials[rarity] || state.materials[rarity] < needed){
    alert(`${rarity} 素材が不足しています！

必要：${needed}個
所持：${state.materials[rarity] || 0}個`);
    return;
  }

  state.materials[rarity] -= needed;
  companion.level++;
  let oldAtk = companion.atk;
  companion.atk = Math.floor(companion.atk * 1.15);

  alert(`
素材を消費して

${companion.name}
を Lv${companion.level} に上げました！

ATK: ${Math.floor(oldAtk)} → ${companion.atk}`);

  save();
  render();

}

// ガチャ
// ======================

function getRarity(){

  let roll = Math.random() * 100;

  let sum = 0;

  for(let r of RARITY){

    sum += r.rate;

    if(roll <= sum){
      return r;
    }

  }

}

function createMonster(r){

  let el = rand(ELEMENTS);

  let role = rand(ROLES);

  let skill = rand(SKILLS);

  return {

    name:
    `${r.name} ${rand(MONSTER_NAMES)}`,

    rarity:r.name,

    color:r.color,

    atk:
    Math.floor(
      (Math.random()*5 + 3)
      * r.multi
    ),

    level:1,

    element:el.id,

    elementIcon:el.icon,

    role:role.id,

    roleIcon:role.icon,

    roleName:role.name,

    skill:skill

  };

}

async function runGacha(){

  if(state.gachaCoins <= 0){
    alert("コイン不足");
    return;
  }

  state.gachaCoins--;

  let results = [];

  for(let i=0;i<10;i++){

    let rarity = getRarity();

    let monster =
    createMonster(rarity);

    results.push(monster);

    state.companions.push(monster);

    // 素材取得
    if(!state.materials[rarity.name]){
      state.materials[rarity.name] = 0;
    }
    state.materials[rarity.name]++;

  }

  await playGachaAnimation(results);

  save();
  render();

}

async function playGachaAnimation(results){

  gachaOverlay.style.display = "flex";

  gachaCards.innerHTML = "";

  let hasSSR =
  results.some(r=>r.rarity==="SSR");

  if(hasSSR){
    await ssrRainbowEffect();
  }else{
    await wait(300);
  }

  for(let r of results){

    if(r.rarity==="SSR"){
      await showCutin();
    }

    let card = createCard(r);

    gachaCards.appendChild(card);

    await wait(120);

  }

}

      </div>

      <button onclick="addParty(${i})">
      編成
      </button>

      `;

      monsterList.appendChild(div);
    });
  }

  // 図鑑更新
  renderDex();

  // ログインボーナスカレンダー表示
  let loginBonusDisplay = document.getElementById('loginBonusDisplay');
  if(loginBonusDisplay){

    for(let i=1;i<=7;i++){
      let isCompleted = state.loginStreak >= i;

        <div style="color:#4cc9f0;">+${Math.floor(i/7)+1}<br/>🪙</div>

  // マイルストーン
  milestoneList.innerHTML = "";

    let progress = 0;

      progress = state.tasksCompleted;
    if(m.type === "level") 
      progress = state.level;
    if(m.type === "combo") 
      progress = state.maxCombo;
    if(m.type === "bosses") 
      progress = state.bossesDefeated;

    div.style = isCompleted 
      ? "opacity:.5;text-decoration:line-through;"

    div.innerHTML = `

    <div style="margin-top:4px;">
      進度: ${progress}/${m.count}

      </div>

    milestoneList.appendChild(div);

  let shopItems = document.getElementById('shopItems');
  if(shopItems){

    SHOP_ITEMS.forEach(item=>{

      let div = document.createElement("div");

      div.style = `
        background:#111827;
        border:2px solid #4cc9f0;
        border-radius:8px;
        padding:10px;
        text-align:center;
        cursor:pointer;
        transition:.2s;
      `;

      let canBuy = state.gold >= item.price;

      div.style.opacity = canBuy ? "1" : "0.6";

      div.innerHTML = `
        <div style="font-size:28px;">${item.icon}</div>
        <div style="margin:8px 0;font-weight:bold;">${item.name}</div>
        <div style="color:gold;font-size:14px;">💰 ${item.price}</div>

      div.onmouseout = ()=>{ div.style.transform = "scale(1)"; };

      shopItems.appendChild(div);

    });
  }

  // デイリーミッション
  dailyList.innerHTML = "";

  let today = getTodayDateKey();

  DAILY_MISSIONS.forEach(m=>{

    let isCompleted = 
    state.dailyMissionsCompleted.includes(m.id);

    let progress = 0;

    if(m.type === "tasks") 
      progress = state.tasksCompleted;
    if(m.type === "level") 
      progress = Math.min(state.level, m.target);
    if(m.type === "gold") 
      progress = state.goldEarned;
    if(m.type === "bosses") 
      progress = state.bossesDefeated;

    <div class="bar" style="margin-top:6px;">
      <div class="barInner expBar" 
        style="width:${Math.min(100, progress/m.target*100)}%">
      </div>
    </div>
    `;

    dailyList.appendChild(div);

  });

}
